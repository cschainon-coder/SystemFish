name: Deploy to GitHub Pages

# ทุกครั้งที่ push ขึ้น main -> build เว็บเวอร์ชัน static แล้ว deploy ขึ้น GitHub Pages อัตโนมัติ
# (กดรันเองจากแท็บ Actions ก็ได้ผ่าน workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# ถ้ามี deploy ค้างอยู่ ให้รอให้จบก่อน ไม่ยกเลิกกลางคัน
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      # ต้องตั้ง Settings > Pages > Source = "GitHub Actions" ในหน้าเว็บ GitHub ก่อนหนึ่งครั้ง
      # (workflow ไม่มีสิทธิ์เปิด Pages ให้เอง)
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
